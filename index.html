<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAMPRO - Premium System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#0f172a] text-gray-200 antialiased">

    <div id="public-landing-view" class="block relative min-h-screen">
        <nav class="border-b border-gray-800 bg-[#1e293b]/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center max-w-7xl mx-auto w-full">
            <span class="text-xl font-black text-white">SAHAM<span class="text-emerald-400">PRO</span></span>
            <a href="#pricing" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-5 py-2 rounded-xl text-sm transition">Mulai Langganan</a>
        </nav>
        
        <header class="max-w-5xl mx-auto px-6 pt-20 text-center">
            <h1 class="text-4xl md:text-6xl font-black text-white">Ikuti Jejak <span class="text-emerald-400">Big Player</span></h1>
            <p class="text-gray-400 mt-6 max-w-2xl mx-auto">Dashboard pintar untuk menyaring emiten undervalued dan memantau bandar.</p>
            <div class="mt-10"><a href="#pricing" class="bg-emerald-600 px-8 py-4 rounded-xl font-bold">Lihat Paket</a></div>
        </header>

        <div class="absolute bottom-6 right-6">
            <button onclick="switchView('owner')" class="text-slate-700 hover:text-emerald-400 transition flex items-center gap-2">
                <i class="fa-solid fa-lock text-sm"></i> <span class="text-xs font-bold">Owner Portal</span>
            </button>
        </div>
    </div>

    <div id="owner-dashboard-view" class="hidden flex-col min-h-screen p-6">
        <div class="max-w-5xl mx-auto w-full">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-black text-white">DASHBOARD OWNER</h2>
                <button onclick="switchView('public')" class="bg-slate-800 px-4 py-2 rounded-lg text-xs">Keluar</button>
            </div>
            <div class="flex gap-4">
                <input type="text" id="stockInput" placeholder="Masukkan Ticker (Contoh: BBRI)" class="bg-slate-800 p-3 rounded-xl w-full uppercase">
                <button onclick="updateDashboardData()" class="bg-emerald-600 px-6 rounded-xl font-bold">Cari</button>
            </div>
            <div id="result-area" class="mt-8 p-6 bg-[#1e293b] rounded-3xl border border-gray-700">
                <h1 id="stock-title-label" class="text-2xl font-black text-emerald-400">--</h1>
                <div id="lbl-status-bandar" class="text-lg font-bold mt-4">--</div>
            </div>
        </div>
    </div>

    <script>
        // GANTI PIN DI BAWAH INI
        const OWNER_PIN = "1234"; 

        function switchView(target) {
            if (target === 'owner') {
                const userPin = prompt("Masukkan PIN Keamanan:");
                if (userPin === OWNER_PIN) {
                    document.getElementById('public-landing-view').style.display = 'none';
                    document.getElementById('owner-dashboard-view').style.display = 'flex';
                } else {
                    alert("PIN Salah!");
                }
            } else {
                document.getElementById('public-landing-view').style.display = 'block';
                document.getElementById('owner-dashboard-view').style.display = 'none';
            }
        }

        function updateDashboardData() {
            const ticker = document.getElementById('stockInput').value.toUpperCase();
            document.getElementById('stock-title-label').innerText = ticker;
            document.getElementById('lbl-status-bandar').innerText = "Status: Big Accumulation"; // Contoh Data
        }
    </script>
</body>
</html>
