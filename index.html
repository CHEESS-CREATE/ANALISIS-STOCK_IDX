<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDX AUTO - Bandarmology Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-gray-100 min-h-screen flex flex-col p-0 m-0">

    <nav class="bg-[#1e293b] border-b border-gray-800 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4 sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <span class="text-xl font-black tracking-wider text-white">IDX<span class="text-emerald-400">AUTO</span></span>
        </div>
        
        <div class="flex items-center bg-[#0f172a] rounded-xl px-4 py-2 border border-gray-700 w-full max-w-md focus-within:border-emerald-500 transition">
            <input type="text" id="stockInput" value="BBRI" placeholder="Ketik Kode Saham (Contoh: TLKM, GOTO)..." class="bg-transparent text-white font-extrabold text-base focus:outline-none w-full uppercase placeholder-gray-500">
            <button type="button" id="btnSearchStock" class="bg-emerald-600 text-white font-bold px-5 py-2 rounded-lg text-xs hover:bg-emerald-500 transition ml-2">
                Cari
            </button>
        </div>
    </nav>

    <main class="flex-1 p-4 md:p-8 max-w-4xl mx-auto w-full">
        <div class="mb-6 text-center md:text-left">
            <h1 class="text-2xl md:text-3xl font-black text-white">Radar Bandarmology <span class="text-emerald-400" id="stock-title">BBRI</span></h1>
            <p class="text-xs text-gray-400 mt-1">Analisis otomatis indikator bursa, volume akumulasi, dan distribusi secara real-time.</p>
        </div>

        <div class="bg-[#1e293b]/60 border border-gray-800 p-4 rounded-3xl shadow-xl h-[450px] flex flex-col">
            <div class="text-xs font-bold text-gray-400 uppercase tracking-widest text-center mb-3">— Live Market Summary Gauge —</div>
            <div id="tv_bandarmology_radar" class="w-full flex-1 rounded-2xl overflow-hidden">
                </div>
        </div>
    </main>

    <script>
        document.getElementById('btnSearchStock').onclick = function() { loadBandarmology(); };
        document.getElementById('stockInput').onkeypress = function(e) {
            if (e.key === 'Enter') { loadBandarmology(); }
        };

        function loadBandarmology() {
            let symbol = document.getElementById('stockInput').value.trim().toUpperCase();
            if(!symbol) { symbol = "BBRI"; }

            // Update nama emiten di judul halaman
            document.getElementById('stock-title').innerText = symbol;

            // Bersihkan kontainer lama sebelum memuat emiten baru
            const container = document.getElementById('tv_bandarmology_radar');
            container.innerHTML = "";

            // Buat element script widget TradingView baru secara dinamis
            const tvScript = document.createElement('script');
            tvScript.type = 'text/javascript';
            tvScript.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
            tvScript.async = true;
            
            // Konfigurasi otomatis emiten IDX Indonesia
            tvScript.innerHTML = JSON.stringify({
                "interval": "1D",
                "width": "100%",
                "height": "100%",
                "isTransparent": true,
                "symbol": "IDX:" + symbol,
                "showIntervalTabs": true,
                "locale": "id",
                "colorTheme": "dark"
            });

            container.appendChild(tvScript);
        }

        // Load otomatis pertama kali halaman dibuka
        window.onload = function() {
            loadBandarmology();
        };
    </script>
</body>
</html>
